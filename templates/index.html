<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投放数据分析工具</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
         background: #f5f7fa; color: #333; }
  header { background: #2c5f8a; color: #fff; padding: 16px 24px;
           display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 20px; }
  .container { max-width: 1400px; margin: 0 auto; padding: 24px; }

  .card { background: #fff; border-radius: 10px; padding: 20px;
          box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 20px; }
  .card h2 { font-size: 15px; color: #2c5f8a; margin-bottom: 14px;
             border-bottom: 2px solid #e8f0f8; padding-bottom: 8px; }

  #dropzone { border: 2px dashed #b0c4de; border-radius: 8px; padding: 32px;
              text-align: center; cursor: pointer; transition: border-color .2s; }
  #dropzone.dragover { border-color: #2c5f8a; background: #f0f6ff; }
  #dropzone p { color: #888; margin-top: 8px; font-size: 14px; }
  #file-input { display: none; }
  .file-tag { display: inline-flex; align-items: center; gap: 6px;
              background: #e8f0f8; color: #2c5f8a; border-radius: 16px;
              padding: 4px 12px; font-size: 13px; margin: 4px; }
  .file-tag span { cursor: pointer; color: #999; }

  .btn { padding: 8px 18px; border: none; border-radius: 6px; cursor: pointer;
         font-size: 14px; transition: opacity .2s; }
  .btn-primary { background: #2c5f8a; color: #fff; }
  .btn-secondary { background: #e8f0f8; color: #2c5f8a; }
  .btn-danger { background: #ff6b6b; color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn:hover { opacity: 0.85; }

  .metric-row { display: grid;
    grid-template-columns: 160px 1fr 1fr 130px 100px 90px auto;
    gap: 8px; align-items: center; padding: 8px 0;
    border-bottom: 1px solid #f0f0f0; }
  .metric-row:first-child { font-weight: 600; font-size: 12px; color: #888; }
  select, input[type="text"] { width: 100%; padding: 6px 8px; border: 1px solid #d0d9e8;
    border-radius: 6px; font-size: 13px; }
  .config-manage { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
                   margin-bottom: 12px; }
  .saved-config-tag { display: inline-flex; align-items: center; gap: 6px;
    background: #f0f6ff; border: 1px solid #b0c4de; border-radius: 16px;
    padding: 4px 12px; font-size: 13px; cursor: pointer; }
  .saved-config-tag .del { cursor: pointer; color: #ff6b6b; }

  .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
                 gap: 20px; }
  .chart-card { background: #fff; border-radius: 10px; padding: 16px;
                box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .chart-card h3 { font-size: 14px; color: #555; margin-bottom: 12px; }
  .chart-container { position: relative; height: 280px; }

  .custom-chart-builder { background: #f8fafc; border-radius: 8px; padding: 14px;
                           margin-bottom: 16px; }
  .custom-chart-builder label { font-size: 13px; color: #666; margin-right: 8px; }

  .table-wrapper { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #2c5f8a; color: #fff; padding: 8px 12px; text-align: left;
       white-space: nowrap; }
  td { padding: 7px 12px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
  tr:hover td { background: #f8fafc; }
  .anomaly { background: #fff0f0 !important; color: #c0392b; font-weight: 600; }
  .platform-title { font-weight: 600; color: #2c5f8a; margin: 12px 0 6px; }

  .time-filter { display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
                 margin-bottom: 12px; font-size: 13px; }

  .action-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

  .spinner { display: none; width: 18px; height: 18px; border: 3px solid #ccc;
             border-top-color: #2c5f8a; border-radius: 50%;
             animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading .spinner { display: inline-block; }

  .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
  .tab { padding: 8px 18px; border-radius: 6px 6px 0 0; cursor: pointer;
         font-size: 14px; background: #e8f0f8; color: #555; }
  .tab.active { background: #2c5f8a; color: #fff; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* 模式开关 */
  .mode-badge { display: inline-flex; align-items: center; gap: 6px;
    background: #e8f4ff; border: 1px solid #9ab8d8; border-radius: 20px;
    padding: 4px 12px; font-size: 12px; color: #2c5f8a; font-weight: 600; }
  .mode-switch { display: inline-flex; border: 1px solid #d0d9e8; border-radius: 6px; overflow: hidden; }
  .mode-switch button { padding: 5px 14px; border: none; background: #f5f7fa;
    cursor: pointer; font-size: 13px; color: #666; border-right: 1px solid #d0d9e8; }
  .mode-switch button:last-child { border-right: none; }
  .mode-switch button.active { background: #2c5f8a; color: #fff; }

  /* 环比表格 */
  .wow-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .wow-table th { background: #2c5f8a; color: #fff; padding: 8px 14px; white-space: nowrap; }
  .wow-table td { padding: 8px 14px; border-bottom: 1px solid #f0f0f0; white-space: nowrap; }
  .wow-table tr:hover td { background: #f8fafc; }
  .up-good   { color: #27ae60; font-weight: 600; }
  .up-bad    { color: #c0392b; font-weight: 600; }
  .down-good { color: #27ae60; font-weight: 600; }
  .down-bad  { color: #c0392b; font-weight: 600; }
  .neutral   { color: #888; }

  .ai-report { line-height: 1.8; font-size: 14px; color: #333; }
  .ai-report h3 { font-size: 15px; color: #2c5f8a; margin: 20px 0 8px;
                  padding-bottom: 4px; border-bottom: 1px solid #e8f0f8; }
  .ai-report h3:first-child { margin-top: 0; }
  .ai-report p { margin-bottom: 10px; }
  .ai-report ul, .ai-report ol { padding-left: 20px; margin-bottom: 10px; }
  .ai-report li { margin-bottom: 4px; }
  .ai-report strong { color: #c0392b; }
  .ai-placeholder { text-align: center; padding: 60px 20px; color: #aaa; }
  .ai-placeholder p { margin-top: 10px; font-size: 14px; }
  .ai-loading { text-align: center; padding: 60px 20px; color: #2c5f8a; }
  .ai-loading .ai-spinner { width: 36px; height: 36px; border: 4px solid #e8f0f8;
    border-top-color: #2c5f8a; border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 16px; }
  .ai-error { background: #fff0f0; border: 1px solid #ffcdd2; border-radius: 8px;
              padding: 16px; color: #c0392b; font-size: 14px; }

  .formula-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    display: flex; align-items: center; justify-content: center; z-index: 2000; }
  .formula-modal { background: #fff; border-radius: 12px; padding: 24px;
    width: 560px; max-width: 95vw; box-shadow: 0 8px 32px rgba(0,0,0,0.18); }
  .formula-modal h3 { margin: 0 0 16px; font-size: 16px; color: #2c5f8a; }
  .formula-field-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
  .formula-field-btn { padding: 4px 10px; background: #e8f0f8; border: 1px solid #b0c4de;
    border-radius: 6px; font-size: 12px; cursor: pointer; color: #2c5f8a; }
  .formula-field-btn:hover { background: #2c5f8a; color: #fff; }
  .formula-op-btns { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .formula-op-btn { padding: 5px 12px; background: #f5f5f5; border: 1px solid #ddd;
    border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 600; }
  .formula-op-btn:hover { background: #333; color: #fff; }
  .formula-preview { background: #f8fafc; border: 1px solid #d0d9e8; border-radius: 8px;
    padding: 10px 14px; font-size: 14px; min-height: 40px; color: #333;
    font-family: monospace; word-break: break-all; margin-bottom: 12px; }
  .formula-preview em { color: #2c5f8a; font-style: normal; font-weight: 600; }
  .formula-modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

  #toast { position: fixed; bottom: 24px; right: 24px; background: #333; color: #fff;
           padding: 10px 18px; border-radius: 8px; font-size: 14px; display: none;
           z-index: 1000; }
</style>
</head>
<body>
<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
  </svg>
  <h1>投放数据分析工具</h1>
</header>

<div class="container">
  <!-- 上传区 -->
  <div class="card">
    <h2>📁 上传数据文件</h2>
    <div id="dropzone" onclick="document.getElementById('file-input').click()">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#b0c4de" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>拖拽或点击上传 CSV 文件（支持多文件）</p>
    </div>
    <input type="file" id="file-input" accept=".csv" multiple>
    <div id="file-list" style="margin-top:10px"></div>
    <div id="field-preview" style="margin-top:10px;font-size:13px;color:#888"></div>
  </div>

  <!-- 指标配置 -->
  <div class="card">
    <h2>⚙️ 指标配置</h2>
    <div class="config-manage">
      <span style="font-size:13px;color:#666">已保存配置：</span>
      <div id="saved-configs"></div>
      <button class="btn btn-secondary btn-sm" onclick="applyBaseConfig()">📌 基础配置</button>
      <input type="text" id="config-name-input" placeholder="新配置名称..." style="width:160px">
      <button class="btn btn-secondary btn-sm" onclick="saveCurrentConfig()">💾 保存当前配置</button>
    </div>
    <div id="metrics-header" class="metric-row" style="font-size:12px;color:#888;font-weight:600">
      <div>指标名称</div><div>分子字段</div><div>分母字段</div>
      <div>数据类型</div><div>货币/单位</div><div></div><div></div>
    </div>
    <div id="metrics-list"></div>
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <button class="btn btn-secondary btn-sm" onclick="addMetricRow()">＋ 简单指标（分子÷分母）</button>
      <button class="btn btn-secondary btn-sm" onclick="openFormulaBuilder(-1)">🧮 自定义公式指标</button>
    </div>
  </div>

  <!-- 公式构建器弹窗 -->
  <div id="formula-modal-overlay" class="formula-modal-overlay" style="display:none"
       onclick="if(event.target===this)closeFormulaBuilder()">
    <div class="formula-modal">
      <h3>🧮 自定义公式指标</h3>
      <div style="margin-bottom:8px">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">指标名称</label>
        <input type="text" id="fb-name" placeholder="如：ROI、CPM、ROAS..." style="width:100%">
      </div>
      <div style="margin-bottom:8px">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">数据类型</label>
        <select id="fb-type" style="width:160px">
          <option value="percent">百分比 (%)</option>
          <option value="currency">金额</option>
          <option value="count">数量</option>
          <option value="custom">自定义</option>
        </select>
        <input type="text" id="fb-unit" placeholder="货币/单位..." style="width:100px;margin-left:8px">
      </div>
      <div style="margin-bottom:6px">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:6px">点击字段插入公式</label>
        <div id="fb-field-btns" class="formula-field-btns"></div>
      </div>
      <div style="margin-bottom:10px">
        <label style="font-size:12px;color:#888;display:block;margin-bottom:6px">运算符</label>
        <div class="formula-op-btns">
          <button class="formula-op-btn" onclick="fbInsert('+')">+</button>
          <button class="formula-op-btn" onclick="fbInsert('-')">−</button>
          <button class="formula-op-btn" onclick="fbInsert('*')">×</button>
          <button class="formula-op-btn" onclick="fbInsert('/')">÷</button>
          <button class="formula-op-btn" onclick="fbInsert('(')"> ( </button>
          <button class="formula-op-btn" onclick="fbInsert(')')"> ) </button>
          <button class="formula-op-btn" onclick="fbInsertNum()">数字</button>
          <button class="formula-op-btn" style="background:#fff0f0;border-color:#ffcdd2;color:#c0392b" onclick="fbBackspace()">⌫</button>
          <button class="formula-op-btn" style="background:#fff0f0;border-color:#ffcdd2;color:#c0392b" onclick="fbClear()">清空</button>
        </div>
      </div>
      <div>
        <label style="font-size:12px;color:#888;display:block;margin-bottom:4px">公式预览</label>
        <div id="fb-preview" class="formula-preview">—</div>
      </div>
      <div class="formula-modal-actions">
        <button class="btn btn-secondary btn-sm" onclick="closeFormulaBuilder()">取消</button>
        <button class="btn btn-primary btn-sm" onclick="confirmFormulaBuilder()">确认添加</button>
      </div>
    </div>
  </div>

  <!-- 筛选区 -->
  <div class="card" id="filter-card" style="display:none">
    <h2>🔍 数据筛选</h2>
    <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:flex-start">
      <div>
        <div style="font-size:13px;color:#666;margin-bottom:6px;font-weight:600">项目（app）</div>
        <div style="position:relative;display:inline-block;min-width:220px">
          <div id="app-dropdown-btn" onclick="toggleAppDropdown()"
               style="cursor:pointer;padding:6px 32px 6px 10px;border:1px solid #d0d9e8;
                      border-radius:6px;font-size:13px;background:#fff;user-select:none;
                      min-height:32px;line-height:20px">
            <span id="app-dropdown-label">全部项目</span>
            <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);color:#888">▾</span>
          </div>
          <div id="app-dropdown-menu"
               style="display:none;position:absolute;top:calc(100% + 4px);left:0;min-width:220px;
                      max-height:260px;overflow-y:auto;background:#fff;border:1px solid #d0d9e8;
                      border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:999;padding:6px 0">
            <label style="display:flex;align-items:center;gap:8px;padding:6px 14px;cursor:pointer;
                          font-size:13px;font-weight:600;border-bottom:1px solid #f0f0f0;margin-bottom:2px">
              <input type="checkbox" id="app-select-all" onchange="toggleSelectAll(this)"
                     style="width:14px;height:14px"> 全选
            </label>
            <div id="app-filter-options"></div>
          </div>
        </div>
      </div>
      <div>
        <div style="font-size:13px;color:#666;margin-bottom:6px;font-weight:600">日期范围</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <input type="date" id="filter-date-start"
                 style="padding:5px 8px;border:1px solid #d0d9e8;border-radius:6px;font-size:13px">
          <span style="color:#888">至</span>
          <input type="date" id="filter-date-end"
                 style="padding:5px 8px;border:1px solid #d0d9e8;border-radius:6px;font-size:13px">
          <button class="btn btn-secondary btn-sm" onclick="clearDateFilter()">清空</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 操作按钮 -->
  <div class="card" style="padding:16px">
    <div class="action-row">
      <button class="btn btn-primary" id="analyze-btn" onclick="runAnalysis()">
        📊 生成分析
        <div class="spinner" style="vertical-align:middle;margin-left:6px"></div>
      </button>
      <button class="btn btn-secondary" onclick="exportExcel()">📥 导出 Excel</button>
    </div>
  </div>

  <!-- 结果区 -->
  <div id="results-section" style="display:none">
    <!-- 顶栏：模式显示 + 手动切换 + 指标开关 -->
    <div class="card" style="padding:14px 20px;margin-bottom:0;border-radius:10px 10px 0 0">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <span id="mode-badge" class="mode-badge">⚡ 快照对比</span>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:12px;color:#888">手动切换：</span>
          <div class="mode-switch">
            <button id="mode-btn-snapshot" onclick="switchMode('snapshot')">快照对比</button>
            <button id="mode-btn-trend" onclick="switchMode('trend')">时间趋势</button>
          </div>
        </div>
        <div style="flex:1;min-width:200px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span style="font-size:13px;font-weight:600;color:#444;white-space:nowrap">📌 指标显示：</span>
          <div id="metric-toggle-checkboxes" style="display:flex;flex-wrap:wrap;gap:8px;flex:1"></div>
          <div style="display:flex;gap:6px;flex-shrink:0">
            <button class="btn btn-secondary btn-sm" onclick="setAllMetricsVisible(true)">全选</button>
            <button class="btn btn-secondary btn-sm" onclick="setAllMetricsVisible(false)">全不选</button>
          </div>
        </div>
      </div>
    </div>

    <!-- 快照对比区：本期/基期标签选择 -->
    <div id="wow-order-bar" class="card" style="display:none;padding:10px 20px;margin-top:2px;
         border-radius:0;border-top:1px solid #e8f0f8">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:13px">
        <span style="color:#666">本期（较新）：</span>
        <select id="current-file-select" onchange="reRenderSnapshot()"
                style="padding:4px 8px;font-size:13px;border:1px solid #d0d9e8;border-radius:6px"></select>
        <span style="color:#666">基期（较旧）：</span>
        <select id="base-file-select" onchange="reRenderSnapshot()"
                style="padding:4px 8px;font-size:13px;border:1px solid #d0d9e8;border-radius:6px"></select>
      </div>
    </div>

    <div class="tabs" style="margin-top:4px">
      <div class="tab active" onclick="switchTab('charts')">📈 图表分析</div>
      <div class="tab" onclick="switchTab('table')">📋 数据表格</div>
      <div class="tab" onclick="switchTab('ai')">🤖 AI 智能分析</div>
    </div>

    <!-- 图表 Tab -->
    <div id="tab-charts" class="tab-content active">
      <div class="charts-grid" id="charts-grid"></div>
      <div class="card" style="margin-top:20px">
        <h2>🎨 自定义对比图</h2>
        <div class="custom-chart-builder">
          <label>选择指标：</label>
          <div id="custom-metric-checkboxes" style="display:inline-flex;gap:12px;flex-wrap:wrap"></div>
          <button class="btn btn-secondary btn-sm" style="margin-left:12px"
                  onclick="buildCustomChart()">生成自定义图</button>
        </div>
        <div class="chart-container" style="max-width:800px">
          <canvas id="customChart"></canvas>
        </div>
      </div>
    </div>

    <!-- 表格 Tab -->
    <div id="tab-table" class="tab-content">
      <div class="card">
        <h2>📋 数据汇总</h2>
        <!-- 快照：环比表 -->
        <div id="wow-table-container" style="display:none"></div>
        <!-- 通用明细表 -->
        <div id="tables-container"></div>
      </div>
    </div>

    <!-- AI 分析 Tab -->
    <div id="tab-ai" class="tab-content">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;
                    flex-wrap:wrap;gap:12px;margin-bottom:16px">
          <h2 style="margin:0;border:none;padding:0">🤖 AI 智能投放分析</h2>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
            <input type="password" id="ai-api-key"
                   placeholder="输入 Anthropic API Key（sk-ant-...）"
                   style="width:280px;padding:7px 10px;border:1px solid #d0d9e8;
                          border-radius:6px;font-size:13px">
            <button class="btn btn-primary" id="ai-analyze-btn" onclick="runAIAnalysis()">
              ✨ 生成专业分析报告
              <div class="spinner" style="vertical-align:middle;margin-left:6px"></div>
            </button>
          </div>
        </div>
        <div id="ai-analysis-content">
          <div class="ai-placeholder">
            <p style="font-size:32px">🤖</p>
            <p style="margin-top:10px;color:#aaa;font-size:14px">填写 API Key 后点击按钮，AI 将以专业投放数据优化师视角分析您的数据</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────────
// 全局状态
// ─────────────────────────────────────────────────────────────
let uploadedFiles  = [];
let allColumns     = [];
let metricRows     = [];
let analysisResult = null;
let chartInstances = {};
let visibleMetrics = new Set();
let currentMode    = 'snapshot'; // 'snapshot' | 'trend'

// ─────────────────────────────────────────────────────────────
// 工具
// ─────────────────────────────────────────────────────────────
function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', duration);
}

                '#edc948','#b07aa1','#ff9da7','#9c755f','#bab0ac'];

function destroyChart(id) {

function yAxisLabel(type, currency='', unit='') {

async function handleFiles(files) {
  if (!files.length) return;
  const fd = new FormData();
  for (const f of files) fd.append('files', f);
  try {
    const res = await fetch('/api/upload', { method: 'POST', body: fd });
    if (!res.ok) { showToast('❌ 上传失败: ' + res.status); return; }
    const data = await res.json();
    if (data.error) { showToast('❌ ' + data.error); return; }
    uploadedFiles = uploadedFiles.concat(data.files);
    allColumns = [...new Set(uploadedFiles.flatMap(f => f.columns))];
    renderFileList();
    renderFieldPreview();
    refreshMetricFieldOptions();
    loadSavedConfigs();
    renderFilterUI();

}

function renderFileList() {

     <span onclick="removeFile(${i})">✕</span></span>`

function removeFile(idx) {

function renderFieldPreview() {

function addMetricRow(preset={}) {
  const type = preset.type || 'percent';
  metricRows.push({
    name: preset.name || '', numerator: preset.numerator || '',
    denominator: preset.denominator || '', type,
    currency: preset.currency || (type === 'currency' ? 'USD' : ''),
    unit: preset.unit || (type === 'percent' ? '%' : ''),
    formula: preset.formula || '', isFormula: preset.isFormula || false,
  });
  renderMetricRows();
}

function unitFieldHtml(m, i) {
  if (m.type === 'currency')
    return `<input type="text" value="USD" readonly style="background:#f5f5f5;color:#888;cursor:not-allowed" oninput="metricRows[${i}].currency=this.value">`;
  if (m.type === 'percent')
    return `<input type="text" value="%" readonly style="background:#f5f5f5;color:#888;cursor:not-allowed" oninput="metricRows[${i}].unit=this.value">`;
  if (m.type === 'count')
    return `<input type="text" value="" placeholder="单位..." oninput="metricRows[${i}].unit=this.value">`;
  return `<input type="text" placeholder="单位..." value="${m.unit||''}" oninput="metricRows[${i}].unit=this.value">`;
}

function autoFillUnit(idx, type) {
  if (type === 'currency') { metricRows[idx].currency = 'USD'; metricRows[idx].unit = ''; }
  else if (type === 'percent') { metricRows[idx].unit = '%'; metricRows[idx].currency = ''; }
  else { metricRows[idx].currency = ''; }
}

function renderMetricRows() {
  const container = document.getElementById('metrics-list');
  const opts = allColumns.map(c => `<option value="${c}">${c}</option>`).join('');
  container.innerHTML = metricRows.map((m, i) => {
    if (m.isFormula) {
      return `<div class="metric-row" id="mrow-${i}">
        <input type="text" value="${m.name}" placeholder="指标名称" oninput="metricRows[${i}].name=this.value">
        <span style="font-size:12px;color:#666;padding:0 4px">公式: ${m.formula}</span>
        ${unitFieldHtml(m, i)}
        <div></div>
        <button class="btn btn-danger btn-sm" onclick="removeMetricRow(${i})">删除</button>
      </div>`;
    }
    return `<div class="metric-row" id="mrow-${i}">
      <input type="text" value="${m.name}" placeholder="指标名称" oninput="metricRows[${i}].name=this.value">
      <select onchange="metricRows[${i}].numerator=this.value">
        <option value="">--选择分子--</option>${opts}
      </select>
      <select onchange="metricRows[${i}].denominator=this.value">
        <option value="">--选择分母--</option>${opts}
      </select>
      <select onchange="metricRows[${i}].type=this.value;autoFillUnit(${i},this.value);renderMetricRows()">
        <option value="percent" ${m.type==='percent'?'selected':''}>百分比 (%)</option>
        <option value="currency" ${m.type==='currency'?'selected':''}>金额</option>
        <option value="count" ${m.type==='count'?'selected':''}>数量</option>
        <option value="custom" ${m.type==='custom'?'selected':''}>自定义</option>
      </select>
      ${unitFieldHtml(m, i)}
      <div></div>
      <button class="btn btn-danger btn-sm" onclick="removeMetricRow(${i})">删除</button>
    </div>`;
  }).join('');
  metricRows.forEach((m, i) => {
    if (m.isFormula) return;
    const row = document.getElementById(`mrow-${i}`);
    if (!row) return;
    const selects = row.querySelectorAll('select');
    selects[0].value = m.numerator;
    selects[1].value = m.denominator;
  });
}

function removeMetricRow(idx) { metricRows.splice(idx, 1); renderMetricRows(); }

let fbEditIdx = -1;
let fbTokens  = [];

function openFormulaBuilder(idx) {
  fbEditIdx = idx; fbTokens = [];
  const overlay = document.getElementById('formula-modal-overlay');
  const nameEl = document.getElementById('fb-name');
  const typeEl = document.getElementById('fb-type');
  const unitEl = document.getElementById('fb-unit');
  if (idx >= 0 && metricRows[idx]?.isFormula) {
    const m = metricRows[idx];
    nameEl.value = m.name; typeEl.value = m.type;
    unitEl.value = m.type === 'currency' ? m.currency : m.unit;
    fbTokens = m.formula ? m.formula.split(/(?<=\})|(?=\{)|(?<=[+\-*/()])|(?=[+\-*/()])/).filter(t=>t.trim()) : [];
  } else { nameEl.value=''; typeEl.value='percent'; unitEl.value=''; }
  const fieldBtns = document.getElementById('fb-field-btns');
  fieldBtns.innerHTML = allColumns.length
    ? allColumns.map(c => `<button class="formula-field-btn" onclick="fbInsertField('${c.replace(/'/g,"\\'")}')"> ${c}</button>`).join('')
    : '<span style="font-size:12px;color:#aaa">请先上传 CSV 文件</span>';
  fbUpdatePreview();
  overlay.style.display = 'flex';
  nameEl.focus();
}

function closeFormulaBuilder() { document.getElementById('formula-modal-overlay').style.display='none'; }
function fbInsertField(f) { fbTokens.push(`{${f}}`); fbUpdatePreview(); }
function fbInsert(op) { const m={'×':'*','÷':'/'}; fbTokens.push(m[op]||op); fbUpdatePreview(); }
function fbInsertNum() { const n=prompt('输入数字：'); if(n&&!isNaN(+n.trim())){fbTokens.push(n.trim());fbUpdatePreview();} }
function fbBackspace() { fbTokens.pop(); fbUpdatePreview(); }
function fbClear() { fbTokens=[]; fbUpdatePreview(); }
function fbUpdatePreview() {
  const el = document.getElementById('fb-preview');
  if (!fbTokens.length) { el.textContent='（点击字段和运算符来构建公式）'; return; }
  const dm = {'*':'×','/':'÷'};
  el.innerHTML = fbTokens.map(t => t.startsWith('{')&&t.endsWith('}')
    ? `<em>${t.slice(1,-1)}</em>` : (dm[t]||t)).join(' ');
}

function confirmFormulaBuilder() {
  const name    = document.getElementById('fb-name').value.trim();
  const type    = document.getElementById('fb-type').value;
  const unit    = document.getElementById('fb-unit').value.trim();
  const formula = fbTokens.join('');
  if (!name) { showToast('请填写指标名称'); return; }
  if (!formula) { showToast('请构建公式'); return; }
  const row = { name, type, currency: type==='currency'?unit:'', unit: type!=='currency'?unit:'',
                formula, isFormula:true, numerator:'', denominator:'' };
  if (fbEditIdx>=0) metricRows[fbEditIdx]=row; else metricRows.push(row);
  renderMetricRows(); closeFormulaBuilder();
}

async function loadSavedConfigs() {
  try {
    const res = await fetch('/api/metrics');
    if (!res.ok) throw new Error('加载失败');
    const configs = await res.json();
    const el = document.getElementById('saved-configs');
    el.innerHTML = configs.map(c =>
      `<span class="saved-config-tag" onclick="applyConfig('${c.name}')">
         ${c.name}<span class="del" onclick="event.stopPropagation();deleteConfig('${c.name}')">✕</span>

      if (cfg) { metricRows = cfg.metrics.map(m=>({...m})); renderMetricRows(); }

  } catch(e) { showToast('❌ 删除失败：' + e.message); }
}

async function applyConfig(name) {
  try {
    const res = await fetch('/api/metrics');
    const configs = await res.json();
    const cfg = configs.find(c => c.name === name);
    if (!cfg) return;
    metricRows = cfg.metrics.map(m => ({...m}));

// ─────────────────────────────────────────────────────────────
// 运行分析
// ─────────────────────────────────────────────────────────────
async function runAnalysis() {
  if (!uploadedFiles.length) { showToast('请先上传 CSV 文件'); return; }
  const validMetrics = metricRows.filter(m => m.name && m.numerator && m.denominator);
  if (!validMetrics.length) { showToast('请至少配置一个完整的指标'); return; }

  const checkedApps = [...document.querySelectorAll('#app-filter-options input:checked')].map(c => c.value);
  const dateStart   = document.getElementById('filter-date-start').value;
  const dateEnd     = document.getElementById('filter-date-end').value;

  document.getElementById('analyze-btn').classList.add('loading');
  try {
    const res = await fetch('/api/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        files: uploadedFiles.map(f => ({filename:f.filename, platform:f.platform, time_column:f.time_column})),
        metrics: validMetrics,
        filter_apps: checkedApps,
        filter_date_start: dateStart,
        filter_date_end: dateEnd,
        mode: 'auto',
      })
    });
    if (!res.ok) { showToast('❌ 分析失败: ' + res.status); return; }
    const data = await res.json();
    if (data.error) { showToast('❌ ' + data.error); return; }

    analysisResult = data;
    document.getElementById('results-section').style.display = 'block';

    // 设置模式
    applyMode(data.mode || 'snapshot');

    // 初始化本期/基期选择器
    if (uploadedFiles.length >= 2) {
      const curSel  = document.getElementById('current-file-select');
      const baseSel = document.getElementById('base-file-select');
      const opts    = uploadedFiles.map((f,i) => `<option value="${i}">${f.platform}</option>`).join('');
      curSel.innerHTML  = opts;
      baseSel.innerHTML = opts;
      curSel.value  = '0';
      baseSel.value = '1';
    }

    visibleMetrics = new Set(validMetrics.map(m => m.name));
    renderMetricToggles(validMetrics);

    if (data.mode === 'snapshot') {
      renderSnapshotCharts(data.charts, validMetrics);
    } else {
      renderTrendCharts(data.charts, validMetrics);
    }
    renderTables(data.tables, validMetrics);
    renderCustomChartBuilder(validMetrics);
    if (data.wow) renderWowTable(data.wow);
    else document.getElementById('wow-table-container').style.display = 'none';

  } catch(e) {
    showToast('❌ 分析失败：' + e.message);
  } finally {
    document.getElementById('analyze-btn').classList.remove('loading');
  }
}

// 本期/基期切换后重发请求（简化：直接调 runAnalysis，order 信息附带在 files 顺序里）
async function reRenderSnapshot() {
  if (!analysisResult) return;
  const curIdx  = parseInt(document.getElementById('current-file-select').value);
  const baseIdx = parseInt(document.getElementById('base-file-select').value);
  if (curIdx === baseIdx) { showToast('本期和基期不能是同一个文件'); return; }
  // 重排 uploadedFiles 顺序（本期第一，基期第二）并重新分析
  const ordered = [uploadedFiles[curIdx], uploadedFiles[baseIdx],
    ...uploadedFiles.filter((_,i) => i!==curIdx && i!==baseIdx)];
  const origFiles = uploadedFiles;
  uploadedFiles = ordered;
  await runAnalysis();
  uploadedFiles = origFiles;
}

// ─────────────────────────────────────────────────────────────
// 图表渲染 — 快照模式（分组柱状图）
// ─────────────────────────────────────────────────────────────
function renderSnapshotCharts(charts, metricDefs) {
  const grid = document.getElementById('charts-grid');
  grid.innerHTML = '';
  const groups = {};
  for (const [mname, cdata] of Object.entries(charts)) {
    if (!visibleMetrics.has(mname)) continue;
    const dtype = cdata.type || 'count';
    if (!groups[dtype]) groups[dtype] = [];
    groups[dtype].push({ name: mname, ...cdata });
  }
  const groupLabels = { percent:'转化率对比', currency:'成本对比', count:'数量对比', custom:'自定义指标对比' };
  for (const [dtype, items] of Object.entries(groups)) {
    const card = document.createElement('div');
    card.className = 'chart-card';
    const canvasId = `chart-${dtype}`;
    card.innerHTML = `<h3>${groupLabels[dtype]||dtype}</h3><div class="chart-container"><canvas id="${canvasId}"></canvas></div>`;
    grid.appendChild(card);
    destroyChart(canvasId);
    const allPlatforms = [...new Set(items.flatMap(it => it.labels||[]))];
    const colors = getColors(items.length);
    const datasets = items.map((item, ci) => {
      const dataMap = {};
      (item.labels||[]).forEach((lbl, li) => { dataMap[lbl] = item.datasets?.[0]?.data?.[li] ?? null; });
      return {
        label: item.name,
        data: allPlatforms.map(p => dataMap[p] ?? null),
        backgroundColor: colors[ci] + 'cc',
        borderColor: colors[ci],
        borderWidth: 1,
      };
    });
    const yLabel = yAxisLabel(dtype, items[0]?.currency, items[0]?.unit);
    chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
      type: 'bar',
      data: { labels: allPlatforms, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { position:'bottom' },
          tooltip: { callbacks: { label: ctx => {
            const v = ctx.parsed.y;
            if (v===null) return ctx.dataset.label+': -';
            return ctx.dataset.label+': '+(yLabel==='%' ? v.toFixed(2)+'%' : yLabel+v.toFixed(2));
          }}}
        },
        scales: { y: { ticks: { callback: v => yLabel==='%' ? v.toFixed(1)+'%' : yLabel+v } } }
      }
    });
  }
}

// ─────────────────────────────────────────────────────────────
// 图表渲染 — 趋势模式（折线图）
// ─────────────────────────────────────────────────────────────
function renderTrendCharts(charts, metricDefs) {
  const grid = document.getElementById('charts-grid');
  grid.innerHTML = '';
  const groups = {};
  for (const [mname, cdata] of Object.entries(charts)) {
    if (!visibleMetrics.has(mname)) continue;
    const dtype = cdata.type || 'count';
    if (!groups[dtype]) groups[dtype] = [];
    groups[dtype].push({ name: mname, ...cdata });
  }
  const groupLabels = { percent:'转化率趋势', currency:'成本趋势', count:'数量趋势', custom:'自定义指标趋势' };
  for (const [dtype, items] of Object.entries(groups)) {
    const card = document.createElement('div');
    card.className = 'chart-card';
    const canvasId = `chart-${dtype}`;
    card.innerHTML = `<h3>${groupLabels[dtype]||dtype}</h3><div class="chart-container"><canvas id="${canvasId}"></canvas></div>`;
    grid.appendChild(card);
    destroyChart(canvasId);
    const labels = items[0]?.labels || [];
    const colors = getColors(items.flatMap(i => i.datasets).length);
    let colorIdx = 0;
    const datasets = items.flatMap(item =>
      (item.datasets||[]).map(ds => ({
        label: `${ds.label} - ${item.name}`,
        data: ds.data,
        borderColor: colors[colorIdx++],
        backgroundColor: 'transparent',
        tension: 0.3, pointRadius: 4, spanGaps: false,
      }))
    );
    const yLabel = yAxisLabel(dtype, items[0]?.currency, items[0]?.unit);
    chartInstances[canvasId] = new Chart(document.getElementById(canvasId), {
      type: 'line',
      data: { labels, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { position:'bottom' },
          tooltip: { callbacks: { label: ctx => {
            const v = ctx.parsed.y;
            if (v===null||v===undefined) return ctx.dataset.label+': -';
            return ctx.dataset.label+': '+(yLabel==='%' ? v.toFixed(2)+'%' : yLabel+v.toFixed(2));
          }}}
        },
        scales: {
          x: { ticks: { maxRotation:45, autoSkip:true, maxTicksLimit:12 } },
          y: { ticks: { callback: v => yLabel==='%' ? v.toFixed(2)+'%' : yLabel+v } }
        }
      }
    });
  }
}

// ─────────────────────────────────────────────────────────────
// 自定义对比图
// ─────────────────────────────────────────────────────────────
function renderCustomChartBuilder(metricDefs) {
  const el = document.getElementById('custom-metric-checkboxes');
  el.innerHTML = metricDefs.map(m =>
    `<label style="font-size:13px;cursor:pointer">
      <input type="checkbox" value="${m.name}" ${visibleMetrics.has(m.name)?'checked':''}
        onchange="syncMetricToggle('${m.name}',this.checked)"> ${m.name}
    </label>`
  ).join('');
}

function buildCustomChart() {
  if (!analysisResult) return;
  const checked = [...document.querySelectorAll('#custom-metric-checkboxes input:checked')].map(i => i.value);
  if (!checked.length) { showToast('请勾选至少一个指标'); return; }
  destroyChart('customChart');
  const charts = analysisResult.charts;
  const colors = getColors(checked.length * 4);
  let colorIdx = 0;
  const types = [...new Set(checked.map(n => charts[n]?.type))];
  const hasMixed = types.length > 1;
  const labels = charts[checked[0]]?.labels || [];
  const datasets = [];
  const yAxes = {};
  const chartType = currentMode === 'snapshot' ? 'bar' : 'line';
  checked.forEach(mname => {
    const cdata = charts[mname];
    if (!cdata) return;
    const yAxisId = hasMixed ? cdata.type : 'y';
    yAxes[yAxisId] = yAxisLabel(cdata.type, cdata.currency, cdata.unit);
    (cdata.datasets||[]).forEach(ds => {
      datasets.push({
        label: `${ds.label} - ${mname}`, data: ds.data,
        borderColor: colors[colorIdx], backgroundColor: colors[colorIdx++]+'aa',
        tension:0.3, pointRadius:4, yAxisID: yAxisId, spanGaps:false,
      });
    });
  });
  const scalesConfig = { x: { ticks: { maxRotation:45, autoSkip:true, maxTicksLimit:12 } } };
  Object.entries(yAxes).forEach(([id, label], i) => {
    scalesConfig[id] = { position:i===0?'left':'right', ticks:{ callback: v => label==='%'?v+'%':label+v } };
  });
  chartInstances['customChart'] = new Chart(document.getElementById('customChart'), {
    type: chartType,
    data: { labels, datasets },
    options: {
      responsive:true, maintainAspectRatio:false,
      interaction:{ mode:'index', intersect:false },
      plugins: { legend:{ position:'bottom' }, tooltip:{ callbacks:{ label: ctx => {
        const ax = yAxes[ctx.dataset.yAxisID||'y']||'';
        const v  = ctx.parsed.y;
        if (v===null||v===undefined) return ctx.dataset.label+': -';
        return ctx.dataset.label+': '+(ax==='%'?v.toFixed(2)+'%':ax?ax+v.toFixed(2):v.toFixed(4));
      }}}},
      scales: scalesConfig
    }
  });
}

// ─────────────────────────────────────────────────────────────
// 环比表格（模式A专用）
// ─────────────────────────────────────────────────────────────
const ABS_COLS = new Set(['installs','register_success_events','first_time_events',
                          'first_time_paid_events','cost']);

function renderWowTable(wow) {
  const container = document.getElementById('wow-table-container');
  if (!wow?.rows?.length) { container.style.display='none'; return; }
  container.style.display = 'block';
  const rows = wow.rows.filter(r => visibleMetrics.has(r.metric) || ABS_COLS.has(r.metric));

  const fmtVal = (row, val) => {
    if (val===null||val===undefined) return '-';
    const m = metricRows.find(m => m.name===row.metric);
    if (!m) return typeof val==='number' ? val.toLocaleString() : String(val);
    if (m.type==='percent')  return val.toFixed(2)+'%';
    if (m.type==='currency') return (m.currency||'')+val.toFixed(2);
    return val.toFixed(4);
  };

  const colorClass = (row, isPositive) => {
    if (isPositive===null) return 'neutral';
    return row.direction==='higher'
      ? (isPositive ? 'up-good' : 'down-bad')
      : (isPositive ? 'up-bad'  : 'down-good');
  };

  const fmtDeltaAbs = row => {
    const d = row.delta;
    if (d===null||d===undefined) return '-';
    const m  = metricRows.find(m => m.name===row.metric);
    const isPositive = d>0 ? true : d<0 ? false : null;
    const cls = colorClass(row, isPositive);
    let s;
    if (!m)                          s = (d>0?'+':'')+Math.round(d).toLocaleString();
    else if (m.type==='percent')     s = (d>0?'+':'')+d.toFixed(2)+'%';
    else if (m.type==='currency')    s = (d>0?'+':'')+(m.currency||'')+d.toFixed(2);
    else                             s = (d>0?'+':'')+d.toFixed(4);
    return `<span class="${cls}">${s}</span>`;
  };

  const fmtDeltaPct = row => {
    const d = row.delta_pct;
    if (d===null||d===undefined) return '<span class="neutral">-</span>';
    const isPositive = d>0 ? true : d<0 ? false : null;
    const cls  = colorClass(row, isPositive);
    const arrow = isPositive===null ? '→' : (isPositive ? '▲' : '▼');
    return `<span class="${cls}">${arrow} ${Math.abs(d).toFixed(2)}%</span>`;
  };

  const trs = rows.map(row => `<tr>
    <td>${row.metric}</td>
    <td>${fmtVal(row, row.base)}</td>
    <td>${fmtVal(row, row.current)}</td>
    <td>${fmtDeltaAbs(row)}</td>
    <td>${fmtDeltaPct(row)}</td>
  </tr>`).join('');

  container.innerHTML = `
    <p class="platform-title" style="margin-bottom:10px">
      📊 周环比：${wow.base_label} → ${wow.current_label}
    </p>
    <div class="table-wrapper">
      <table class="wow-table">
        <thead><tr>
          <th>指标</th><th>基期（${wow.base_label}）</th>
          <th>本期（${wow.current_label}）</th>
          <th>变化量</th><th>环比变化率</th>
        </tr></thead>
        <tbody>${trs}</tbody>
      </table>
    </div>`;
}

// ─────────────────────────────────────────────────────────────
// 明细表格
// ─────────────────────────────────────────────────────────────
function renderTables(tables, metricDefs) {
  const container  = document.getElementById('tables-container');
  const dtypeMap   = {};
  metricDefs.forEach(m => dtypeMap[m.name] = m);
  const metricNames = new Set(metricDefs.map(m => m.name));
  container.innerHTML = tables.map(table => {
    const cols = table.columns.filter(c => !metricNames.has(c) || visibleMetrics.has(c));
    const header = cols.map(c => `<th>${c}</th>`).join('');
    const rowsHtml = table.rows.map((row, ri) => {
      const cells = cols.map(col => {
        let val = row[col] ?? '-';
        const isAnom = table.anomalies[col]?.includes(ri);
        let display = val;
        if (col in dtypeMap && val!==''&&val!=='-') {
          const m=dtypeMap[col], num=parseFloat(val);
          if (!isNaN(num)) {
            if (m.type==='percent')  display = num.toFixed(2)+'%';
            else if (m.type==='currency') display = (m.currency||'')+num.toFixed(2);
            else if (m.type==='count')    display = Math.round(num).toLocaleString();
            else display = num+(m.unit||'');
          }
        }
        return `<td class="${isAnom?'anomaly':''}">${display}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');
    return `<p class="platform-title">📊 ${table.platform}</p>
      <div class="table-wrapper">
        <table><thead><tr>${header}</tr></thead><tbody>${rowsHtml}</tbody></table>
      </div>`;
  }).join('<br>');
}

// ─────────────────────────────────────────────────────────────
// 导出 Excel
// ─────────────────────────────────────────────────────────────
async function exportExcel() {
  if (!analysisResult) { showToast('请先运行分析'); return; }
  const validMetrics = metricRows.filter(m => m.name&&m.numerator&&m.denominator);
  const configName   = document.getElementById('config-name-input').value || '导出';
  try {
    const res = await fetch('/api/export/excel', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ tables:analysisResult.tables, metrics:validMetrics, config_name:configName })
    });
    if (!res.ok) { showToast('❌ 导出失败'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url;
    a.download = res.headers.get('Content-Disposition')?.match(/filename=(.+)/)?.[1]||'export.xlsx';
    a.click(); setTimeout(()=>URL.revokeObjectURL(url),1000);
    showToast('✅ Excel 已导出');
  } catch(e) { showToast('❌ 导出失败：'+e.message); }
}

// ─────────────────────────────────────────────────────────────
// Tab 切换 / AI 分析
// ─────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  document.querySelector(`.tab[onclick="switchTab('${name}')"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

async function runAIAnalysis() {
  if (!analysisResult) { showToast('请先运行分析'); return; }
  const apiKey = document.getElementById('ai-api-key').value.trim();
  if (!apiKey) { showToast('请先填写 Anthropic API Key'); return; }
  const btn=document.getElementById('ai-analyze-btn'), container=document.getElementById('ai-analysis-content');
  btn.classList.add('loading'); btn.disabled=true;
  container.innerHTML='<div class="ai-loading"><div class="ai-spinner"></div><p>正在分析投放数据，请稍候（约10-30秒）...</p></div>';
  const vm=metricRows.filter(m=>m.name&&m.numerator&&m.denominator);
  const summary=buildDataSummary(analysisResult,vm);
  try {
    const res=await fetch('/api/ai-analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({api_key:apiKey,data_summary:summary})});
    if(!res.ok){const err=await res.json().catch(()=>({}));throw new Error(err.error||'请求失败:'+res.status);}
    const data=await res.json();
    if(data.error) throw new Error(data.error);
    container.innerHTML='<div class="ai-report">'+renderMarkdown(data.result)+'</div>';
  } catch(e){
    container.innerHTML=`<div class="ai-error">❌ 分析失败：${e.message}<br><small>请检查 API Key 是否正确</small></div>`;
  } finally{btn.classList.remove('loading');btn.disabled=false;}
}

function buildDataSummary(result, metricDefs) {
  const lines=[],dtypeMap={};
  metricDefs.forEach(m=>dtypeMap[m.name]=m);
  result.tables.forEach(table=>{
    lines.push(`【平台：${table.platform}】`);
    lines.push(`数据行数：${table.rows.length} 条`);
    metricDefs.map(m=>m.name).filter(n=>table.columns.includes(n)).forEach(col=>{
      const vals=table.rows.map(r=>parseFloat(r[col])).filter(v=>!isNaN(v));
      if(!vals.length) return;
      const avg=vals.reduce((a,b)=>a+b,0)/vals.length;
      const m=dtypeMap[col];
      const fmt=v=>m?.type==='percent'?v.toFixed(2)+'%':m?.type==='currency'?(m.currency||'')+v.toFixed(2):v.toFixed(4);
      lines.push(`  ${col}：平均=${fmt(avg)}，最低=${fmt(Math.min(...vals))}，最高=${fmt(Math.max(...vals))}`);
    });
    lines.push('');
  });
  return lines.join('\n');
}

function renderMarkdown(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h1>$1</h1>')
    .replace(/^(\d+)\. (.+)$/gm,'<li>$2</li>').replace(/^[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>\n?)+/g,s=>`<ul>${s}</ul>`)
    .replace(/\n\n/g,'</p><p>').replace(/\n/g,'<br>')
    .replace(/^(.)/,'<p>$1').replace(/(.)$/,'$1</p>');
}
